<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
background:#0f111a;
font-family:monospace;
height:100vh;
overflow:hidden;
}

/* DOCK */

#dock{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:20px;
padding:12px 20px;
background:rgba(60,60,60,0.35);
backdrop-filter:blur(20px);
border-radius:22px;
}

.dock-item img{
width:48px;
height:48px;
cursor:pointer;
transition:0.2s;
}

.dock-item img:hover{
transform:scale(1.3);
}

/* WINDOWS */

.window{
position:absolute;
width:380px;
height:240px;
background:#1b1d2b;
border-radius:26px;
box-shadow:0 30px 70px rgba(0,0,0,0.7);
display:none;
flex-direction:column;
overflow:hidden;
}

/* TITLE BAR */

.titlebar{
background:#2a2c40;
padding:6px;
display:flex;
align-items:center;
gap:8px;
cursor:grab;
}

.winbtn{
width:12px;
height:12px;
border-radius:50%;
cursor:pointer;
}

.close{background:#ff5f57;}
.min{background:#febc2e;}
.max{background:#28c840;}

.title{
margin-left:10px;
color:white;
}

/* TERMINAL */

#terminalOutput{
flex:1;
background:#0f111a;
color:#00ffc8;
padding:10px;
overflow:auto;
}

#terminalInput{
border:none;
border-top:1px solid #333;
background:#0f111a;
color:#00ffc8;
padding:8px;
outline:none;
}

/* FILE MANAGER */

#files{
flex:1;
background:#111;
color:white;
padding:10px;
overflow:auto;
}

.folder{
background:#2a2c40;
margin:4px 0;
padding:6px;
border-radius:8px;
display:flex;
justify-content:space-between;
}

.delete{
color:#ff5f57;
cursor:pointer;
}
</style>
</head>

<body>

<!-- DOCK -->

<div id="dock">

<div class="dock-item" onclick="openApp('terminal')">
<img src="https://cdn-icons-png.flaticon.com/512/4248/4248443.png">
</div>

<div class="dock-item" onclick="openApp('filesApp')">
<img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
</div>

</div>

<!-- TERMINAL -->

<div id="terminal" class="window">

<div class="titlebar" onmousedown="dragStart(event,'terminal')">

<div class="winbtn close" onclick="closeApp('terminal')"></div>
<div class="winbtn min" onclick="minApp('terminal')"></div>
<div class="winbtn max" onclick="maxApp('terminal')"></div>

<div class="title">Terminal</div>

</div>

<div id="terminalOutput"></div>

<input id="terminalInput" placeholder="type command">

</div>

<!-- FILE MANAGER -->

<div id="filesApp" class="window">

<div class="titlebar" onmousedown="dragStart(event,'filesApp')">

<div class="winbtn close" onclick="closeApp('filesApp')"></div>
<div class="winbtn min" onclick="minApp('filesApp')"></div>
<div class="winbtn max" onclick="maxApp('filesApp')"></div>

<div class="title">Files</div>

</div>

<div id="files"></div>

</div>

<script>

/* APP CONTROL */

function openApp(id){
let win=document.getElementById(id)

win.style.display="flex"

win.style.left=(window.innerWidth/2-200)+"px"
win.style.top=(window.innerHeight/2-120)+"px"
}

function closeApp(id){
document.getElementById(id).style.display="none"
}

function minApp(id){
document.getElementById(id).style.display="none"
}

function maxApp(id){

let win=document.getElementById(id)

win.style.left="40px"
win.style.top="40px"

win.style.width=(window.innerWidth-80)+"px"
win.style.height=(window.innerHeight-140)+"px"
}

/* DRAG */

let dragTarget=null
let offsetX=0
let offsetY=0

function dragStart(e,id){

dragTarget=document.getElementById(id)

offsetX=e.clientX-dragTarget.offsetLeft
offsetY=e.clientY-dragTarget.offsetTop

document.onmousemove=dragMove
document.onmouseup=dragEnd
}

function dragMove(e){

if(!dragTarget)return

dragTarget.style.left=(e.clientX-offsetX)+"px"
dragTarget.style.top=(e.clientY-offsetY)+"px"

}

function dragEnd(){

dragTarget=null

document.onmousemove=null
}

/* FILE SYSTEM */

let fs=JSON.parse(localStorage.getItem("hyperdeskFS")||'{"root":{}}')

function saveFS(){

localStorage.setItem("hyperdeskFS",JSON.stringify(fs))

}

function renderFiles(){

let container=document.getElementById("files")

container.innerHTML=""

for(let f in fs.root){

let div=document.createElement("div")

div.className="folder"

div.innerHTML=`${f}<span class="delete" onclick="deleteFolder('${f}')">✕</span>`

container.appendChild(div)

}

}

function createFolder(name){

if(!fs.root[name]){

fs.root[name]={}

saveFS()

renderFiles()

}

}

function deleteFolder(name){

delete fs.root[name]

saveFS()

renderFiles()

}

renderFiles()

/* TERMINAL */

let input=document.getElementById("terminalInput")
let output=document.getElementById("terminalOutput")

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=input.value.trim()

if(cmd==="whoami"){

output.innerHTML+="<div>/</div>"

}

else if(cmd.startsWith("create folder")){

let name=cmd.split(" ")[2]

createFolder(name)

output.innerHTML+="<div>created "+name+"</div>"

}

else{

output.innerHTML+="<div>unknown command</div>"

}

input.value=""

output.scrollTop=output.scrollHeight

}

})

</script>

</body>
</html>
