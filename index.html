<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
background:#0f111a;
font-family:monospace;
height:100vh;
overflow:hidden;
}

/* DOCK */

#dock{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:240px;
height:65px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(40,40,40,.45);
backdrop-filter:blur(14px);
border-radius:20px;
z-index:1000;
}

.dock-item img{
width:50px;
height:50px;
cursor:pointer;
transition:.2s;
}

.dock-item img:hover{
transform:scale(1.35);
}

/* WINDOW */

.window{
position:absolute;
width:420px;
height:280px;
top:120px;
left:120px;
background:#1c1c2e;
border-radius:28px;
display:none;
flex-direction:column;
box-shadow:0 25px 60px rgba(0,0,0,.7);
overflow:hidden;
}

/* TITLE BAR */

.title{
background:#2a2a3f;
color:white;
padding:6px;
cursor:grab;
display:flex;
align-items:center;
gap:8px;
touch-action:none;
}

/* MAC BUTTONS */

.winbtn{
width:12px;
height:12px;
border-radius:50%;
cursor:pointer;
}

.close{background:#ff5f57}
.min{background:#febc2e}
.max{background:#28c840}

/* TERMINAL */

#output{
flex:1;
padding:10px;
overflow:auto;
background:#0f111a;
color:#00ffcc;
}

#cmd{
border:none;
border-top:1px solid #333;
background:#0f111a;
color:#00ffcc;
padding:8px;
outline:none;
}

/* RESIZE HANDLES */

.resize{
position:absolute;
width:16px;
height:16px;
background:rgba(255,255,255,.2);
border-radius:50%;
}

.resize:hover{
background:#00ffcc;
}

.br{bottom:0;right:0;cursor:nwse-resize}
.bl{bottom:0;left:0;cursor:nesw-resize}
.tr{top:0;right:0;cursor:nesw-resize}
.tl{top:0;left:0;cursor:nwse-resize}

</style>
</head>

<body>

<div id="dock">
<div class="dock-item" onclick="openTerminal()">
<img src="https://icons.iconarchive.com/icons/mfayaz/color-stroked/128/terminal-icon.png">
</div>
</div>

<div class="window" id="terminal">

<div class="title">

<div class="winbtn close" onclick="closeWin()"></div>
<div class="winbtn min" onclick="minWin()"></div>
<div class="winbtn max" onclick="maxWin()"></div>

<span style="margin-left:8px;">HyperDesk Terminal</span>

</div>

<div id="output"></div>

<input id="cmd" placeholder="type command">

<div class="resize br"></div>
<div class="resize bl"></div>
<div class="resize tr"></div>
<div class="resize tl"></div>

</div>

<script>

let win=document.getElementById("terminal")
let dock=document.getElementById("dock")
let title=win.querySelector(".title")
let output=document.getElementById("output")

let defaultState={
top:120,
left:120,
width:420,
height:280
}

/* OPEN */

function openTerminal(){
win.style.display="flex"
}

/* MINIMIZE */

function minWin(){
win.style.display="none"
}

/* CLOSE + RESET */

function closeWin(){

win.style.display="none"

win.style.top=defaultState.top+"px"
win.style.left=defaultState.left+"px"
win.style.width=defaultState.width+"px"
win.style.height=defaultState.height+"px"

output.innerHTML=""

}

/* MAXIMIZE */

let maximized=false

function maxWin(){

if(!maximized){

let dockHeight=dock.offsetHeight+20

win.dataset.prevTop=win.offsetTop
win.dataset.prevLeft=win.offsetLeft
win.dataset.prevWidth=win.offsetWidth
win.dataset.prevHeight=win.offsetHeight

win.style.top="0px"
win.style.left="0px"
win.style.width=window.innerWidth+"px"
win.style.height=(window.innerHeight-dockHeight)+"px"

maximized=true

}else{

win.style.top=win.dataset.prevTop+"px"
win.style.left=win.dataset.prevLeft+"px"
win.style.width=win.dataset.prevWidth+"px"
win.style.height=win.dataset.prevHeight+"px"

maximized=false

}

}

/* DRAG WINDOW */

let startX,startY,dragging=false

title.addEventListener("pointerdown",e=>{
dragging=true
startX=e.clientX-win.offsetLeft
startY=e.clientY-win.offsetTop
})

document.addEventListener("pointermove",e=>{

if(!dragging)return

let dockTop=window.innerHeight-dock.offsetHeight-10

let newX=e.clientX-startX
let newY=e.clientY-startY

if(newY<0)newY=0
if(newY+win.offsetHeight>dockTop)newY=dockTop-win.offsetHeight

win.style.left=newX+"px"
win.style.top=newY+"px"

})

document.addEventListener("pointerup",()=>{
dragging=false

if(win.offsetTop<10){
maxWin()
}

})

/* RESIZE */

let resizeDir=null

document.querySelectorAll(".resize").forEach(h=>{

h.addEventListener("pointerdown",e=>{
resizeDir=h.classList[1]
e.stopPropagation()
})

})

document.addEventListener("pointermove",e=>{

if(!resizeDir)return

let rect=win.getBoundingClientRect()

if(resizeDir==="br"){
win.style.width=e.clientX-rect.left+"px"
win.style.height=e.clientY-rect.top+"px"
}

if(resizeDir==="bl"){
let newWidth=rect.right-e.clientX
win.style.width=newWidth+"px"
win.style.left=e.clientX+"px"
win.style.height=e.clientY-rect.top+"px"
}

if(resizeDir==="tr"){
let newHeight=rect.bottom-e.clientY
win.style.height=newHeight+"px"
win.style.top=e.clientY+"px"
win.style.width=e.clientX-rect.left+"px"
}

if(resizeDir==="tl"){
let newWidth=rect.right-e.clientX
let newHeight=rect.bottom-e.clientY
win.style.width=newWidth+"px"
win.style.left=e.clientX+"px"
win.style.height=newHeight+"px"
win.style.top=e.clientY+"px"
}

})

document.addEventListener("pointerup",()=>{
resizeDir=null
})

/* TERMINAL */

let cmd=document.getElementById("cmd")

cmd.addEventListener("keydown",e=>{

if(e.key==="Enter"){

let text=cmd.value.trim()

if(text==="whoami"){
output.innerHTML+="<div>/</div>"
}else{
output.innerHTML+="<div>Unknown command</div>"
}

cmd.value=""
output.scrollTop=output.scrollHeight

}

})

</script>

</body>
</html>
