<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>

body{
margin:0;
background:#0f111a;
font-family:monospace;
height:100vh;
overflow:hidden;
}

/* DOCK */

#dock{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:240px;
height:65px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(40,40,40,.45);
backdrop-filter:blur(14px);
border-radius:14px;
z-index:1000;
}

.dock-item img{
width:50px;
height:50px;
cursor:pointer;
transition:.2s;
}

.dock-item img:hover{
transform:scale(1.35);
}

/* WINDOW */

.window{
position:absolute;
width:420px;
height:280px;
top:100px;
left:100px;
background:#1c1c2e;
border-radius:10px;
display:none;
flex-direction:column;
box-shadow:0 20px 40px rgba(0,0,0,.7);
resize:both;
overflow:hidden;
}

/* TITLE BAR */

.title{
background:#2a2a3f;
color:white;
padding:6px;
cursor:grab;
display:flex;
align-items:center;
gap:8px;
touch-action:none;
}

/* MAC BUTTONS */

.winbtn{
width:12px;
height:12px;
border-radius:50%;
cursor:pointer;
}

.close{background:#ff5f57}
.min{background:#febc2e}
.max{background:#28c840}

/* TERMINAL */

#output{
flex:1;
padding:10px;
overflow:auto;
background:#0f111a;
color:#00ffcc;
}

#cmd{
border:none;
border-top:1px solid #333;
background:#0f111a;
color:#00ffcc;
padding:8px;
outline:none;
}

</style>
</head>

<body>

<!-- DOCK -->

<div id="dock">
<div class="dock-item" onclick="openTerminal()">
<img src="https://icons.iconarchive.com/icons/mfayaz/color-stroked/128/terminal-icon.png">
</div>
</div>

<!-- TERMINAL WINDOW -->

<div class="window" id="terminal">

<div class="title">

<div class="winbtn close" onclick="closeWin()"></div>
<div class="winbtn min" onclick="minWin()"></div>
<div class="winbtn max" onclick="maxWin()"></div>

<span style="margin-left:8px;">HyperDesk Terminal</span>

</div>

<div id="output"></div>

<input id="cmd" placeholder="type command">

</div>

<script>

let win=document.getElementById("terminal")
let title=win.querySelector(".title")
let dock=document.getElementById("dock")

function openTerminal(){
win.style.display="flex"
}

function closeWin(){
win.style.display="none"
}

function minWin(){
win.style.display="none"
}

let maximized=false

function maxWin(){

if(!maximized){

let dockHeight=dock.offsetHeight+20

win.dataset.prevTop=win.style.top
win.dataset.prevLeft=win.style.left
win.dataset.prevWidth=win.style.width
win.dataset.prevHeight=win.style.height

win.style.top="0px"
win.style.left="0px"
win.style.width=window.innerWidth+"px"
win.style.height=(window.innerHeight-dockHeight)+"px"

maximized=true

}else{

win.style.top=win.dataset.prevTop
win.style.left=win.dataset.prevLeft
win.style.width=win.dataset.prevWidth
win.style.height=win.dataset.prevHeight

maximized=false

}

}

/* DRAGGING */

let startX,startY,dragging=false

title.addEventListener("pointerdown",e=>{
dragging=true
startX=e.clientX-win.offsetLeft
startY=e.clientY-win.offsetTop
})

document.addEventListener("pointermove",e=>{

if(!dragging)return

let dockTop=window.innerHeight-dock.offsetHeight-10

let newX=e.clientX-startX
let newY=e.clientY-startY

if(newY<0)newY=0
if(newY+win.offsetHeight>dockTop)newY=dockTop-win.offsetHeight

win.style.left=newX+"px"
win.style.top=newY+"px"

})

document.addEventListener("pointerup",e=>{

if(!dragging)return

dragging=false

/* SNAP TO TOP FULLSCREEN */

if(win.offsetTop<10){
maxWin()
}

})

/* TERMINAL COMMANDS */

let cmd=document.getElementById("cmd")
let output=document.getElementById("output")

cmd.addEventListener("keydown",e=>{

if(e.key==="Enter"){

let text=cmd.value.trim()

if(text==="whoami"){
output.innerHTML+="<div>/</div>"
}else{
output.innerHTML+="<div>Unknown command</div>"
}

cmd.value=""
output.scrollTop=output.scrollHeight

}

})

</script>

</body>
</html>
