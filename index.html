<div id="dock">
  <div class="dock-item" onclick="openTerminal()">
    <img src="https://icons.iconarchive.com/icons/mfayaz/color-stroked/128/terminal-icon.png">
  </div>
</div>

<div class="window" id="terminal">
  <div class="title">HyperDesk Terminal</div>
  <div id="output"></div>
  <input id="cmd" placeholder="type command">
</div>

<style>
body{
  margin:0;
  background:#0f111a;
  font-family:monospace;
}

/* Dock */
#dock{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  width:220px;
  height:60px;
  display:flex;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(12px);
  background:rgba(40,40,40,.45);
  border-radius:12px;
}

.dock-item img{
  width:48px;
  height:48px;
  cursor:pointer;
}

/* Terminal */
.window{
  position:absolute;
  width:420px;
  height:280px;
  top:100px;
  left:100px;
  background:#1c1c2e;
  border-radius:10px;
  display:none;
  flex-direction:column;
}

/* Drag bar */
.title{
  padding:8px;
  background:#222;
  color:white;
  cursor:grab;
  user-select:none;

  /* prevents mobile scroll */
  touch-action:none;
}

/* Terminal output */
#output{
  flex:1;
  padding:10px;
  background:#0f111a;
  color:#00ffcc;
}

#cmd{
  border:none;
  border-top:1px solid #333;
  padding:8px;
  background:#0f111a;
  color:#00ffcc;
}
</style>

<script>
let win = document.getElementById("terminal")
let title = win.querySelector(".title")

function openTerminal(){
  win.style.display="flex"
}

let startX,startY,dragging=false

title.addEventListener("pointerdown",e=>{
  dragging=true
  startX=e.clientX-win.offsetLeft
  startY=e.clientY-win.offsetTop
})

document.addEventListener("pointermove",e=>{
  if(!dragging) return
  win.style.left=e.clientX-startX+"px"
  win.style.top=e.clientY-startY+"px"
})

document.addEventListener("pointerup",()=>{
  dragging=false
})

/* terminal commands */
let cmd=document.getElementById("cmd")
let output=document.getElementById("output")

cmd.addEventListener("keydown",e=>{
 if(e.key==="Enter"){
   let text=cmd.value.trim()
   if(text==="whoami"){
     output.innerHTML+="<div>/</div>"
   }else{
     output.innerHTML+="<div>Unknown command</div>"
   }
   cmd.value=""
 }
})
</script>
