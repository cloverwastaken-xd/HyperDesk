<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;background:#0f111a;font-family:monospace;height:100vh;overflow:hidden;}
#dock{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:300px;height:65px;display:flex;justify-content:center;align-items:center;background:rgba(40,40,40,.45);backdrop-filter:blur(14px);border-radius:20px;z-index:1000;}
.dock-item img{width:50px;height:50px;cursor:pointer;transition:.2s;}
.dock-item img:hover{transform:scale(1.35);}
.window{position:absolute;width:360px;height:220px;background:#1c1c2e;border-radius:28px;display:none;flex-direction:column;box-shadow:0 25px 60px rgba(0,0,0,.7);overflow:hidden;}
.title{background:#2a2a3f;color:white;padding:6px;cursor:grab;display:flex;align-items:center;gap:8px;touch-action:none;}
.winbtn{width:12px;height:12px;border-radius:50%;cursor:pointer;}
.close{background:#ff5f57}.min{background:#febc2e}.max{background:#28c840;}
#output{flex:1;padding:10px;overflow:auto;background:#0f111a;color:#00ffcc;}
#cmd{border:none;border-top:1px solid #333;background:#0f111a;color:#00ffcc;padding:8px;outline:none;}
.resize{position:absolute;width:16px;height:16px;background:rgba(255,255,255,.25);border-radius:50%;}
.resize:hover{background:#00ffcc;}
.br{bottom:0;right:0;cursor:nwse-resize}.bl{bottom:0;left:0;cursor:nesw-resize}.tr{top:0;right:0;cursor:nesw-resize}.tl{top:0;left:0;cursor:nwse-resize;}
/* File Manager UI */
#file-manager-content{flex:1;padding:10px;background:#111;color:white;overflow:auto;}
.folder{background:#2a2a3f;padding:4px 8px;margin:4px 0;border-radius:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.folder span{user-select:none;}
.delete-folder{color:#ff5f57;cursor:pointer;margin-left:10px;}
</style>
</head>
<body>

<div id="dock">
<div class="dock-item" onclick="openTerminal()"><img src="https://icons.iconarchive.com/icons/mfayaz/color-stroked/128/terminal-icon.png"></div>
<div class="dock-item" onclick="openFileManager()"><img src="https://icons.iconarchive.com/icons/mfayaz/color-stroked/128/folder-icon.png"></div>
</div>

<!-- TERMINAL -->
<div class="window" id="terminal">
<div class="title">
<div class="winbtn close" onclick="closeWin('terminal')"></div>
<div class="winbtn min" onclick="minWin('terminal')"></div>
<div class="winbtn max" onclick="maxWin('terminal')"></div>
<span style="margin-left:8px;">HyperDesk Terminal</span>
</div>
<div id="output"></div>
<input id="cmd" placeholder="type command">
<div class="resize br"></div><div class="resize bl"></div><div class="resize tr"></div><div class="resize tl"></div>
</div>

<!-- FILE MANAGER -->
<div class="window" id="file-manager">
<div class="title">
<div class="winbtn close" onclick="closeWin('file-manager')"></div>
<div class="winbtn min" onclick="minWin('file-manager')"></div>
<div class="winbtn max" onclick="maxWin('file-manager')"></div>
<span style="margin-left:8px;">File Manager</span>
</div>
<div id="file-manager-content"></div>
<div class="resize br"></div><div class="resize bl"></div><div class="resize tr"></div><div class="resize tl"></div>
</div>

<script>
let defaultState={width:360,height:220};
function openWindow(win){win.style.display="flex";win.style.width=defaultState.width+"px";win.style.height=defaultState.height+"px";win.style.left=(window.innerWidth/2-defaultState.width/2)+"px";win.style.top=(window.innerHeight/2-defaultState.height/2)+"px";}
function openTerminal(){openWindow(document.getElementById("terminal"));}
function openFileManager(){openWindow(document.getElementById("file-manager"));renderFileManager();}
function minWin(id){document.getElementById(id).style.display="none";}
function closeWin(id){let win=document.getElementById(id);win.style.display="none";if(id==='terminal'){document.getElementById("output").innerHTML="";document.getElementById("cmd").value="";}}
let maximized=false;
function maxWin(id){let win=document.getElementById(id);let sideMargin=40;let topMargin=20;let dockHeight=65+20;if(!maximized){win.dataset.prevTop=win.offsetTop;win.dataset.prevLeft=win.offsetLeft;win.dataset.prevWidth=win.offsetWidth;win.dataset.prevHeight=win.offsetHeight;win.style.left=sideMargin+"px";win.style.top=topMargin+"px";win.style.width=(window.innerWidth-sideMargin*2)+"px";win.style.height=(window.innerHeight-dockHeight-topMargin)+"px";maximized=true;}else{win.style.top=win.dataset.prevTop+"px";win.style.left=win.dataset.prevLeft+"px";win.style.width=win.dataset.prevWidth+"px";win.style.height=win.dataset.prevHeight+"px";maximized=false;}}

/* DRAG AND RESIZE */
function makeDraggable(win){let startX,startY,dragging=false; let resizeDir=null;
let title=win.querySelector(".title"); title.addEventListener("pointerdown",e=>{dragging=true;startX=e.clientX-win.offsetLeft;startY=e.clientY-win.offsetTop;});
document.addEventListener("pointermove",e=>{if(dragging){let dockTop=window.innerHeight-65-10;let newX=e.clientX-startX;let newY=e.clientY-startY;if(newY<0)newY=0;if(newY+win.offsetHeight>dockTop)newY=dockTop-win.offsetHeight;win.style.left=newX+"px";win.style.top=newY+"px";}if(resizeDir){let rect=win.getBoundingClientRect();if(resizeDir==="br"){win.style.width=e.clientX-rect.left+"px";win.style.height=e.clientY-rect.top+"px";}if(resizeDir==="bl"){let newWidth=rect.right-e.clientX;win.style.width=newWidth+"px";win.style.left=e.clientX+"px";win.style.height=e.clientY-rect.top+"px";}if(resizeDir==="tr"){let newHeight=rect.bottom-e.clientY;win.style.height=newHeight+"px";win.style.top=e.clientY+"px";win.style.width=e.clientX-rect.left+"px";}if(resizeDir==="tl"){let newWidth=rect.right-e.clientX;let newHeight=rect.bottom-e.clientY;win.style.width=newWidth+"px";win.style.left=e.clientX+"px";win.style.height=newHeight+"px";win.style.top=e.clientY+"px";}}});
document.addEventListener("pointerup",()=>{dragging=false;resizeDir=null;});
win.querySelectorAll(".resize").forEach(h=>{h.addEventListener("pointerdown",e=>{resizeDir=h.classList[1];e.stopPropagation();});});}
makeDraggable(document.getElementById("terminal"));
makeDraggable(document.getElementById("file-manager"));

/* TERMINAL */

let cmd=document.getElementById("cmd"),output=document.getElementById("output");

/* SIMPLE FILESYSTEM */

let fileSystem=JSON.parse(localStorage.getItem("hyperdeskFS")||'{"root":{}}');

function saveFS(){localStorage.setItem("hyperdeskFS",JSON.stringify(fileSystem));}
function createFolder(name,path){let folders=path.split("/").filter(Boolean);let current=fileSystem.root;for(let f of folders){if(!current[f])current[f]={};current=current[f];}if(!current[name])current[name]={};saveFS();renderFileManager();}
function deleteFolder(path){let parts=path.split("/").filter(Boolean);let name=parts.pop();let current=fileSystem.root;for(let f of parts){current=current[f];}delete current[name];saveFS();renderFileManager();}

function renderFileManager(){let container=document.getElementById("file-manager-content");container.innerHTML="";function renderFolder(obj,path){for(let f in obj){let div=document.createElement("div");div.className="folder";let span=document.createElement("span");span.textContent=f;div.appendChild(span);let del=document.createElement("span");del.textContent="✕";del.className="delete-folder";del.onclick=()=>{deleteFolder(path+"/"+f);};div.appendChild(del);container.appendChild(div);renderFolder(obj[f],path+"/"+f);}}renderFolder(fileSystem.root,"");}

/* TERMINAL COMMANDS */

cmd.addEventListener("keydown",e=>{
if(e.key==="Enter"){
let text=cmd.value.trim();
let m=text.match(/^create folder (\S+) at (\/.*)$/);
if(m){createFolder(m[1],m[2]);output.innerHTML+="<div>Folder '"+m[1]+"' created at "+m[2]+"</div>";}else if(text==="whoami"){output.innerHTML+="<div>/</div>";}else{output.innerHTML+="<div>Unknown command</div>";}
cmd.value=""; output.scrollTop=output.scrollHeight;
});

</script>
</body>
</html>
